<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vogelquiz</title>
<style>
  :root {
    --bg: #0f1a14;
    --bg-card: #1a2a22;
    --bg-card-2: #243a30;
    --text: #e8f3ed;
    --text-dim: #9ab1a4;
    --accent: #5fd49a;
    --accent-dark: #3da876;
    --correct: #4caf50;
    --wrong: #e74c3c;
    --warning: #f39c12;
    --border: #2f4a3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    background: linear-gradient(135deg, #0f1a14 0%, #1a2a22 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; align-items: stretch; justify-content: center; padding: 8px; }
  .app { width: 100%; max-width: 560px; display: flex; flex-direction: column; min-height: 0; }

  /* === SCREENS === */
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  #menu-screen.active, #result-screen.active { justify-content: center; overflow-y: auto; }

  /* === MENU === */
  .menu-title { text-align: center; margin: 16px 0 24px; }
  .menu-title h1 { font-size: 32px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.02em; }
  .menu-title p { color: var(--text-dim); font-size: 14px; }

  .mode-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s, background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-family: inherit;
    width: 100%;
    text-align: left;
    color: var(--text);
  }
  .mode-card:hover { border-color: var(--accent-dark); background: var(--bg-card-2); }
  .mode-card:active { transform: scale(0.99); }
  .mode-card.challenge-card { cursor: default; }
  .mode-card.challenge-card:hover { background: var(--bg-card); border-color: var(--border); }
  .mode-icon { font-size: 30px; flex-shrink: 0; width: 44px; text-align: center; line-height: 1; }
  .mode-content { flex: 1; min-width: 0; }
  .mode-title-text { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .mode-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; line-height: 1.35; }
  .mode-stat { font-size: 12px; color: var(--accent); font-weight: 500; }

  .difficulty-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 12px;
  }
  .difficulty-buttons button {
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    transition: border-color 0.15s, background 0.15s;
  }
  .difficulty-buttons button:hover { border-color: var(--accent-dark); background: #2d4738; }
  .difficulty-buttons .best { font-size: 11px; color: var(--text-dim); font-weight: 500; }

  /* === GAME === */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; padding: 12px 16px;
    background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border);
  }
  .game-back {
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .game-back:hover { color: var(--text); border-color: var(--accent-dark); }
  .stats { display: flex; gap: 14px; font-size: 13px; color: var(--text-dim); }
  .stat strong { color: var(--text); margin-left: 4px; }
  .elo-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; background: var(--bg-card-2); border-radius: 999px;
    font-size: 13px; font-weight: 600; color: var(--accent);
  }
  .meta-line {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--text-dim); padding: 0 4px; margin-bottom: 8px;
  }
  .difficulty-bar {
    height: 4px; background: var(--bg-card-2); border-radius: 2px;
    margin-bottom: 16px; overflow: hidden;
  }
  .difficulty-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dark), var(--accent));
    transition: width 0.4s ease;
  }
  .card {
    background: var(--bg-card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border);
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
  }
  .photo-wrap {
    position: relative; width: 100%;
    background: #0a120e; overflow: hidden;
    flex: 1; min-height: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-wrap img { display: block; width: 100%; height: 100%; object-fit: contain; }
  .photo-wrap .loader {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: var(--text-dim); font-size: 14px;
    text-align: center; padding: 16px;
  }
  .photo-wrap .credit {
    position: absolute; bottom: 6px; right: 8px; font-size: 10px;
    color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.45);
    padding: 2px 6px; border-radius: 4px; text-decoration: none;
  }
  .question { padding: 14px 16px 8px; font-size: 14px; color: var(--text-dim); text-align: center; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 16px 16px; }
  .option {
    background: var(--bg-card-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 12px; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: transform 0.1s, background 0.15s, border-color 0.15s;
    text-align: center; font-family: inherit;
  }
  .option:hover:not(:disabled) { background: #2d4738; border-color: var(--accent-dark); }
  .option:active:not(:disabled) { transform: scale(0.98); }
  .option:disabled { cursor: default; opacity: 0.95; }
  .option.correct { background: rgba(76, 175, 80, 0.18); border-color: var(--correct); color: #c8f0cd; }
  .option.wrong { background: rgba(231, 76, 60, 0.15); border-color: var(--wrong); color: #f5c4be; }
  .option.dim { opacity: 0.45; }
  .feedback { text-align: center; margin-top: 12px; font-size: 14px; min-height: 20px; color: var(--text-dim); }
  .feedback .delta-pos { color: var(--accent); font-weight: 600; }
  .feedback .delta-neg { color: var(--wrong); font-weight: 600; }
  .feedback .rarity { font-size: 11px; opacity: 0.7; display: block; margin-top: 4px; }
  .next-btn {
    display: block; width: 100%; margin-top: 12px; padding: 12px;
    background: var(--accent); color: #0f1a14; border: none;
    border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .next-btn:hover { background: var(--accent-dark); }
  .footer { margin-top: 16px; text-align: center; font-size: 11px; color: var(--text-dim); }
  .footer a { color: var(--text-dim); }
  .footer button {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    padding: 4px 10px; border-radius: 999px; font-size: 11px;
    cursor: pointer; margin-left: 8px; font-family: inherit;
  }
  .footer button:hover { color: var(--text); border-color: var(--accent-dark); }

  /* === RESULT === */
  .result-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px 20px; text-align: center; margin-top: 24px;
  }
  .result-icon { font-size: 56px; margin-bottom: 8px; line-height: 1; }
  .result-title { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
  .result-score-big { font-size: 56px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .result-score-small { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
  .result-best {
    color: var(--text); font-size: 13px;
    padding: 8px 14px; background: var(--bg-card-2);
    border-radius: 999px; display: inline-block; margin-bottom: 20px;
  }
  .result-best.new-record { background: rgba(95, 212, 154, 0.18); color: var(--accent); font-weight: 600; }
  .result-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .primary-btn, .secondary-btn {
    width: 100%; padding: 13px; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; border: none;
  }
  .primary-btn { background: var(--accent); color: #0f1a14; }
  .primary-btn:hover { background: var(--accent-dark); }
  .secondary-btn { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .secondary-btn:hover { color: var(--text); border-color: var(--accent-dark); }

  /* Footer in game-screen blijft op zijn natuurlijke hoogte */
  #game-screen .footer { flex-shrink: 0; }
  #game-screen .header, #game-screen .meta-line, #game-screen .difficulty-bar { flex-shrink: 0; }
  /* Feedback + next-btn container krimpt niet */
  #game-screen .card > div:last-child { flex-shrink: 0; }
  .question { flex-shrink: 0; }
  .options { flex-shrink: 0; }

  @media (max-width: 420px) {
    .options { grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px 10px; }
    .option { padding: 10px 6px; font-size: 13px; }
    .menu-title h1 { font-size: 26px; }
    .stats { font-size: 12px; gap: 8px; }
  }
  /* Lage schermhoogtes: kleinere paddings/lettergroottes zodat foto meer ruimte krijgt */
  @media (max-height: 720px) {
    .header { padding: 8px 14px; margin-bottom: 6px; }
    .meta-line { font-size: 10px; margin-bottom: 4px; }
    .difficulty-bar { margin-bottom: 8px; }
    .question { padding: 8px 16px 4px; font-size: 12px; }
    .options { padding: 8px 12px; gap: 6px; }
    .option { padding: 10px 8px; font-size: 14px; }
    .next-btn { padding: 10px; font-size: 14px; margin-top: 8px; }
    .feedback { margin-top: 6px; font-size: 12px; min-height: 16px; }
    .footer { margin-top: 6px; font-size: 10px; }
  }
  @media (max-height: 560px) {
    .options { grid-template-columns: 1fr 1fr 1fr 1fr; padding: 6px 10px; }
    .option { padding: 8px 4px; font-size: 12px; }
    .header { padding: 6px 12px; margin-bottom: 4px; }
    .header h1 { font-size: 14px; }
    .meta-line { display: none; }
    .difficulty-bar { margin-bottom: 4px; }
    .question { font-size: 11px; padding: 6px 12px 2px; }
    .footer { font-size: 9px; margin-top: 4px; }
  }
</style>
</head>
<body>
  <div class="app">

    <!-- ============== MENU SCREEN ============== -->
    <div id="menu-screen" class="screen">
      <div class="menu-title">
        <h1>🐦 Vogelquiz</h1>
        <p>Kies een modus</p>
      </div>
      <button class="mode-card" data-mode="endless">
        <div class="mode-icon">♾️</div>
        <div class="mode-content">
          <div class="mode-title-text">Endless</div>
          <div class="mode-desc">Speel zonder einde. Je ELO wordt opgeslagen en bepaalt de moeilijkheid.</div>
          <div class="mode-stat" id="menu-endless-stat">ELO: 1000</div>
        </div>
      </button>
      <button class="mode-card" data-mode="highscore">
        <div class="mode-icon">🏆</div>
        <div class="mode-content">
          <div class="mode-title-text">Highscore</div>
          <div class="mode-desc">Hoeveel goed achter elkaar? Eén fout = einde. Moeilijkheid stijgt met elke goede.</div>
          <div class="mode-stat" id="menu-highscore-stat">Beste: 0</div>
        </div>
      </button>
      <div class="mode-card challenge-card">
        <div class="mode-icon">🎯</div>
        <div class="mode-content">
          <div class="mode-title-text">20 Vragen Challenge</div>
          <div class="mode-desc">Vaste set van 20 vragen. Kies de moeilijkheidsgraad:</div>
          <div class="difficulty-buttons" id="challenge-buttons">
            <button data-diff="0.1">Beginner <span class="best" data-diff-key="0.1">—</span></button>
            <button data-diff="0.3">Makkelijk <span class="best" data-diff-key="0.3">—</span></button>
            <button data-diff="0.5">Gemiddeld <span class="best" data-diff-key="0.5">—</span></button>
            <button data-diff="0.7">Moeilijk <span class="best" data-diff-key="0.7">—</span></button>
            <button data-diff="1.0">Expert <span class="best" data-diff-key="1.0">—</span></button>
          </div>
        </div>
      </div>
      <div class="footer" style="margin-top: 24px;">
        <button id="reset-btn" title="Reset alle voortgang">⟲ Reset alles</button>
      </div>
    </div>

    <!-- ============== GAME SCREEN ============== -->
    <div id="game-screen" class="screen">
      <div class="header">
        <button class="game-back" id="game-back-btn">← Menu</button>
        <div class="stats" id="game-stats">
          <span class="stat" id="stat-streak"><span class="stat-label">Streak</span><strong id="streak">0</strong></span>
          <span class="stat" id="stat-correct"><span class="stat-label">Score</span><strong id="correct">0/0</strong></span>
          <span class="elo-badge" id="elo-badge" title="Jouw ELO rating">⚡ <span id="elo">1000</span></span>
        </div>
      </div>
      <div class="meta-line">
        <span id="db-info">…</span>
        <span id="rarity-target">moeilijkheid: …</span>
      </div>
      <div class="difficulty-bar"><div class="difficulty-fill" id="difficulty-fill" style="width: 30%"></div></div>
      <div class="card">
        <div class="photo-wrap">
          <img id="bird-photo" alt="" style="display:none">
          <div class="loader" id="photo-loader">Foto laden…</div>
          <a id="photo-credit" class="credit" target="_blank" rel="noopener" style="display:none">Wikipedia</a>
        </div>
        <div class="question">Welke vogel zie je?</div>
        <div class="options" id="options"></div>
        <div style="padding: 0 16px 16px;">
          <div class="feedback" id="feedback"></div>
          <button class="next-btn" id="next-btn" style="display:none">Volgende vogel →</button>
        </div>
      </div>
      <div class="footer">
        Foto's via <a href="https://nl.wikipedia.org" target="_blank" rel="noopener">Wikipedia</a>
        · Druk 1–4 om te antwoorden · ESC voor menu
      </div>
    </div>

    <!-- ============== RESULT SCREEN ============== -->
    <div id="result-screen" class="screen">
      <div class="result-card">
        <div class="result-icon" id="result-icon">🎉</div>
        <div class="result-title" id="result-title">Klaar!</div>
        <div class="result-score-big" id="result-score">0</div>
        <div class="result-score-small" id="result-score-detail"></div>
        <div class="result-best" id="result-best"></div>
        <div class="result-buttons">
          <button class="primary-btn" id="play-again-btn">Speel opnieuw</button>
          <button class="secondary-btn" id="back-to-menu-btn">Terug naar menu</button>
        </div>
      </div>
    </div>

  </div>

// =================================================================
// STATE
// =================================================================
const STATE_KEY = 'vogelquiz_state_v2';
const STATE_KEY_OLD = 'vogelquiz_state_v1';
const IMG_CACHE_KEY = 'vogelquiz_imgcache_v2';
const FAILED_KEY = 'vogelquiz_failed_v2';
const DEFAULT_STATE = {
  elo: 1000, streak: 0, correct: 0, total: 0, lastBirdId: null,
  highscoreBest: 0,
  challengeBest: {}
};
const DIFFICULTY_LABELS = {
  '0.1': 'Beginner',
  '0.3': 'Makkelijk',
  '0.5': 'Gemiddeld',
  '0.7': 'Moeilijk',
  '1.0': 'Expert',
};

let state = loadState();
const imageCache = loadJSON(IMG_CACHE_KEY, {});
const failedBirds = new Set(loadJSON(FAILED_KEY, []));

function loadJSON(key, fallback) {
  try { const v = JSON.parse(localStorage.getItem(key)); return v ?? fallback; } catch(e) { return fallback; }
}
function saveJSON(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }
function loadState() {
  let saved = loadJSON(STATE_KEY, null);
  if (!saved) saved = loadJSON(STATE_KEY_OLD, null);
  if (saved && typeof saved.elo === 'number') return Object.assign({}, DEFAULT_STATE, saved, { challengeBest: saved.challengeBest || {} });
  return Object.assign({}, DEFAULT_STATE);
}
function saveState() { saveJSON(STATE_KEY, state); }
function saveCache() { saveJSON(IMG_CACHE_KEY, imageCache); }
function saveFailed() { saveJSON(FAILED_KEY, [...failedBirds]); }

// =================================================================
// IMAGE FETCH
// =================================================================
async function fetchBirdImage(bird) {
  if (imageCache[bird.id]) return imageCache[bird.id];
  const tryFetch = async (lang, title) => {
    const url = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
    const r = await fetch(url, { redirect: 'follow' });
    if (!r.ok) throw new Error('http ' + r.status);
    const d = await r.json();
    if (d.type === 'disambiguation') throw new Error('disambig');
    const src = (d.originalimage && d.originalimage.source) || (d.thumbnail && d.thumbnail.source);
    if (!src) throw new Error('no image');
    return { src, page: d.content_urls?.desktop?.page };
  };
  let img;
  try { img = await tryFetch('nl', bird.wiki_nl); }
  catch(e1) {
    try { img = await tryFetch('en', bird.wiki_en); }
    catch(e2) { throw new Error(`Geen foto: ${bird.name}`); }
  }
  imageCache[bird.id] = img;
  saveCache();
  return img;
}

// =================================================================
// QUIZ LOGIC
// =================================================================
function difficultyFromElo(elo) { return Math.min(1, Math.max(0, (elo - 700) / 1000)); }
function preferredRarityFromElo(elo) { const t = difficultyFromElo(elo); return 1 + t * 4; }

function pickTarget(elo) {
  let pool = BIRDS.filter(b => !failedBirds.has(b.id));
  if (state.lastBirdId && pool.length > 1) pool = pool.filter(b => b.id !== state.lastBirdId);
  const preferred = preferredRarityFromElo(elo);
  const sigma = 1.5;
  const weights = pool.map(b => {
    const d = b.rarity - preferred;
    return Math.exp(-(d*d) / (2 * sigma * sigma));
  });
  const total = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) { r -= weights[i]; if (r <= 0) return pool[i]; }
  return pool[pool.length - 1];
}

function pickDistractors(target, difficulty) {
  const sameGroup = BIRDS.filter(b => b.group === target.group && b.id !== target.id && !failedBirds.has(b.id));
  const others = BIRDS.filter(b => b.group !== target.group && !failedBirds.has(b.id));
  const wantSame = Math.min(sameGroup.length, Math.round(difficulty * 3));
  const wantOther = 3 - wantSame;
  const sameShuffled = sameGroup.slice().sort(() => Math.random() - 0.5);
  const othersShuffled = others.slice().sort(() => Math.random() - 0.5);
  return [
    ...sameShuffled.slice(0, wantSame),
    ...othersShuffled.slice(0, wantOther),
  ];
}

function updateElo(playerElo, won, difficulty) {
  const opponentElo = 600 + difficulty * 1100;
  const expected = 1 / (1 + Math.pow(10, (opponentElo - playerElo) / 400));
  const K = 28;
  return Math.round(playerElo + K * ((won ? 1 : 0) - expected));
}

const $ = id => document.getElementById(id);

const elLoader   = $('photo-loader');

const elFeedback = $('feedback');

// =================================================================
// SCREEN MANAGEMENT
// =================================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(name).classList.add('active');
}

// =================================================================
// MODE STATE
// =================================================================
let modeState = null;
let currentRound = null;
let lastResult = null;

function getCurrentDifficulty() {
  if (!modeState) return 0.5;
  if (modeState.mode === 'endless') return difficultyFromElo(state.elo);
  if (modeState.mode === 'highscore') return Math.min(1, modeState.score / 25);
  if (modeState.mode === 'challenge') return modeState.difficulty;
  return 0.5;
}
function getEffectiveElo() {
  if (modeState && modeState.mode === 'endless') return state.elo;
  return 700 + getCurrentDifficulty() * 1000;
}

// =================================================================
// MENU
// =================================================================
function renderMenu() {
  $('menu-endless-stat').textContent = `ELO: ${state.elo}`;
  $('menu-highscore-stat').textContent = `Beste: ${state.highscoreBest || 0}`;
  document.querySelectorAll('[data-diff-key]').forEach(el => {
    const k = el.dataset.diffKey;
    const best = (state.challengeBest && state.challengeBest[k]) || 0;
    el.textContent = best > 0 ? `${best}/20` : '—';
  });
}

function startMode(mode, opts = {}) {
  if (mode === 'endless') {
    modeState = { mode };
  } else if (mode === 'highscore') {
    modeState = { mode, score: 0 };
  } else if (mode === 'challenge') {
    const diff = opts.difficulty;
    const diffKey = opts.difficultyKey || String(diff);
    modeState = { mode, questionNum: 0, correct: 0, difficulty: diff, difficultyKey: diffKey, total: 20 };
  }
  lastResult = null;
  configureGameHeader();
  showScreen('game-screen');
  newRound();
}

function backToMenu(force = false) {
  if (!force && modeState && (modeState.mode === 'highscore' || modeState.mode === 'challenge')) {
    const hasProgress = (modeState.mode === 'highscore' && modeState.score > 0)
                     || (modeState.mode === 'challenge' && modeState.questionNum > 0 && modeState.questionNum < modeState.total);
    if (hasProgress && !confirm('Weet je zeker dat je terug wilt naar het menu? Je huidige run gaat verloren.')) {
      return;
    }
  }
  modeState = null;
  currentRound = null;
  lastResult = null;
  renderMenu();
  showScreen('menu-screen');
}

// =================================================================
// GAME HEADER (mode-aware)
// =================================================================
function configureGameHeader() {
  if (!modeState) return;
  const streakEl = $('stat-streak');
  const correctEl = $('stat-correct');
  const eloBadge = $('elo-badge');
  const streakLabel = streakEl.querySelector('.stat-label');
  const correctLabel = correctEl.querySelector('.stat-label');

  if (modeState.mode === 'endless') {
    eloBadge.style.display = '';
    streakEl.style.display = '';
    correctEl.style.display = '';
    streakLabel.textContent = 'Streak';
    correctLabel.textContent = 'Score';
  } else if (modeState.mode === 'highscore') {
    eloBadge.style.display = 'none';
    streakEl.style.display = '';
    correctEl.style.display = '';
    streakLabel.textContent = 'Score';
    correctLabel.textContent = 'Beste';
  } else if (modeState.mode === 'challenge') {
    eloBadge.style.display = 'none';
    streakEl.style.display = '';
    correctEl.style.display = '';
    streakLabel.textContent = 'Vraag';
    correctLabel.textContent = 'Goed';
  }
}

function refreshGameHeader() {
  if (!modeState) return;
  const eligible = BIRDS.length - failedBirds.size;
  elDbInfo.textContent = `${eligible} vogels`;
  const d = getCurrentDifficulty();
  elDiffFill.style.width = (d * 100).toFixed(0) + '%';
  const pref = preferredRarityFromElo(getEffectiveElo());
  const tier = Math.round(pref);

  if (modeState.mode === 'endless') {
    elRarTgt.textContent = `moeilijkheid ${(d*100).toFixed(0)}% · ${RARITY_LABEL[tier]}`;
    elElo.textContent = state.elo;
    elStreak.textContent = state.streak;
    elCorrect.textContent = `${state.correct}/${state.total}`;
  } else if (modeState.mode === 'highscore') {
    elRarTgt.textContent = `moeilijkheid ${(d*100).toFixed(0)}% · ${RARITY_LABEL[tier]}`;
    elStreak.textContent = modeState.score;
    elCorrect.textContent = state.highscoreBest || 0;
  } else if (modeState.mode === 'challenge') {
    const lbl = DIFFICULTY_LABELS[modeState.difficultyKey] || '';
    elRarTgt.textContent = `${lbl} · ${RARITY_LABEL[tier]}`;
    elStreak.textContent = `${Math.min(modeState.questionNum + 1, modeState.total)}/${modeState.total}`;
    elCorrect.textContent = `${modeState.correct}`;
  }
}

// =================================================================
// GAME LOOP
// =================================================================
async function newRound() {
  if (!modeState) return;
  refreshGameHeader();
  elFeedback.textContent = '';
  elNext.style.display = 'none';
  elOptions.innerHTML = '';
  elPhoto.style.display = 'none';
  elLoader.style.display = 'flex';
  elLoader.textContent = 'Foto laden…';
  elCredit.style.display = 'none';

  let target, img;
  for (let attempt = 0; attempt < 5; attempt++) {
    target = pickTarget(getEffectiveElo());
    if (!target) { elLoader.innerHTML = '⚠️ Geen vogels meer beschikbaar.'; return; }
    try { img = await fetchBirdImage(target); break; }
    catch(err) {
      console.warn('Skip', target.name, err.message);
      failedBirds.add(target.id);
      saveFailed();
      img = null;
    }
  }
  if (!img) { elLoader.textContent = '⚠️ Kan geen vogel met foto vinden.'; return; }

  state.lastBirdId = target.id;
  const difficulty = getCurrentDifficulty();
  const distractors = pickDistractors(target, difficulty);
  const optionsArr = [target, ...distractors].sort(() => Math.random() - 0.5);
  currentRound = { bird: target, options: optionsArr, difficulty, answered: false };

  renderOptions();

  elPhoto.src = img.src;
  elPhoto.alt = '';
  elPhoto.onload = () => { elLoader.style.display = 'none'; elPhoto.style.display = 'block'; };
  elPhoto.onerror = () => {
    elLoader.textContent = 'Kon foto niet laden, volgende vogel…';
    failedBirds.add(target.id);
    saveFailed();
    setTimeout(newRound, 600);
  };
  if (img.page) { elCredit.href = img.page; elCredit.textContent = 'Wikipedia'; }
  // Credit blijft verborgen tot na het antwoord (anders kun je doorklikken naar het juiste vogelartikel)
}

function renderOptions() {
  elOptions.innerHTML = '';
  currentRound.options.forEach((bird, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${idx+1}. ${bird.name}`;
    btn.dataset.id = bird.id;
    btn.onclick = () => answer(bird.id);
    elOptions.appendChild(btn);
  });
}

function answer(chosenId) {
  if (!currentRound || currentRound.answered) return;
  currentRound.answered = true;

  const correct = chosenId === currentRound.bird.id;
  const targetBird = currentRound.bird;

  Array.from(elOptions.children).forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.id === targetBird.id) btn.classList.add('correct');
    else if (btn.dataset.id === chosenId) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });

  // Toon nu pas de Wikipedia-link (zou anders de antwoord verklappen)
  if (elCredit.href) elCredit.style.display = 'block';

  const rarityTxt = RARITY_LABEL[targetBird.rarity];

  if (modeState.mode === 'endless') {
    const oldElo = state.elo;
    const newElo = updateElo(oldElo, correct, currentRound.difficulty);
    const delta = newElo - oldElo;
    state.elo = newElo;
    state.total += 1;
    if (correct) { state.correct += 1; state.streak += 1; } else { state.streak = 0; }
    saveState();
    const sign = delta >= 0 ? '+' : '';
    const cls = delta >= 0 ? 'delta-pos' : 'delta-neg';
    elFeedback.innerHTML = (correct
      ? `Goed! Het was de <strong>${targetBird.name}</strong>. <span class="${cls}">${sign}${delta} ELO</span>`
      : `Het was de <strong>${targetBird.name}</strong>. <span class="${cls}">${sign}${delta} ELO</span>`)
      + `<span class="rarity">${rarityTxt}</span>`;
    refreshGameHeader();
    elNext.textContent = 'Volgende vogel →';
    elNext.style.display = 'block';
    elNext.focus();
  } else if (modeState.mode === 'highscore') {
    if (correct) {
      modeState.score += 1;
      const newDifficulty = Math.min(1, modeState.score / 25);
      elFeedback.innerHTML = `Goed! Het was de <strong>${targetBird.name}</strong>. <span class="delta-pos">${modeState.score} achter elkaar</span>`
        + `<span class="rarity">${rarityTxt} · moeilijkheid ${(newDifficulty*100).toFixed(0)}%</span>`;
      refreshGameHeader();
      elNext.textContent = 'Volgende vogel →';
      elNext.style.display = 'block';
      elNext.focus();
    } else {
      const prevBest = state.highscoreBest || 0;
      const isNewBest = modeState.score > prevBest;
      if (isNewBest) { state.highscoreBest = modeState.score; saveState(); }
      elFeedback.innerHTML = `Helaas! Het was de <strong>${targetBird.name}</strong>.<span class="rarity">${rarityTxt}</span>`;
      lastResult = { mode: 'highscore', score: modeState.score, prevBest, isNewBest };
      elNext.textContent = 'Bekijk resultaat →';
      elNext.style.display = 'block';
      elNext.focus();
    }
  } else if (modeState.mode === 'challenge') {
    modeState.questionNum += 1;
    if (correct) modeState.correct += 1;
    refreshGameHeader();
    const isLast = modeState.questionNum >= modeState.total;
    elFeedback.innerHTML = (correct
      ? `Goed! Het was de <strong>${targetBird.name}</strong>.`
      : `Het was de <strong>${targetBird.name}</strong>.`)
      + `<span class="rarity">${rarityTxt}</span>`;
    if (isLast) {
      const dKey = modeState.difficultyKey;
      const prevBest = (state.challengeBest && state.challengeBest[dKey]) || 0;
      const isNewBest = modeState.correct > prevBest;
      if (isNewBest) {
        state.challengeBest = state.challengeBest || {};
        state.challengeBest[dKey] = modeState.correct;
        saveState();
      }
      lastResult = {
        mode: 'challenge', score: modeState.correct, total: modeState.total,
        difficulty: modeState.difficulty, difficultyKey: dKey, prevBest, isNewBest,
      };
      elNext.textContent = 'Bekijk resultaat →';
    } else {
      elNext.textContent = 'Volgende vraag →';
    }
    elNext.style.display = 'block';
    elNext.focus();
  }
}

// =================================================================
// NEXT
// =================================================================
elNext.onclick = () => {
  if (lastResult && currentRound && currentRound.answered) {
    showResult(lastResult);
    return;
  }
  newRound();
};

// =================================================================
// RESULT
// =================================================================
function showResult(result) {
  const elIcon = $('result-icon');
  const elTitle = $('result-title');
  const elScore = $('result-score');
  const elDetail = $('result-score-detail');
  const elBest = $('result-best');
  const elPlayAgain = $('play-again-btn');

  if (result.mode === 'highscore') {
    elIcon.textContent = result.isNewBest ? '🏆' : (result.score >= 10 ? '🎯' : '😅');
    elTitle.textContent = result.isNewBest ? 'Nieuw record!' : 'Game over';
    elScore.textContent = result.score;
    elDetail.textContent = result.score === 1 ? 'goed' : 'goed achter elkaar';
    if (result.isNewBest && result.prevBest > 0) {
      elBest.textContent = `Vorige beste: ${result.prevBest}`;
      elBest.classList.add('new-record');
    } else if (result.isNewBest) {
      elBest.textContent = 'Eerste record!';
      elBest.classList.add('new-record');
    } else {
      elBest.textContent = `Beste: ${result.prevBest}`;
      elBest.classList.remove('new-record');
    }
    elPlayAgain.textContent = 'Speel opnieuw';
  } else if (result.mode === 'challenge') {
    const pct = Math.round((result.score / result.total) * 100);
    elIcon.textContent = result.isNewBest ? '🏆' : (pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '😅');
    elTitle.textContent = result.isNewBest ? 'Nieuw record!' : 'Challenge afgerond';
    elScore.textContent = `${result.score}/${result.total}`;
    elDetail.textContent = `${pct}% goed · ${DIFFICULTY_LABELS[result.difficultyKey] || ''}`;
    if (result.isNewBest && result.prevBest > 0) {
      elBest.textContent = `Vorige beste: ${result.prevBest}/${result.total}`;
      elBest.classList.add('new-record');
    } else if (result.isNewBest) {
      elBest.textContent = 'Eerste record op deze moeilijkheid!';
      elBest.classList.add('new-record');
    } else {
      elBest.textContent = `Beste: ${result.prevBest}/${result.total}`;
      elBest.classList.remove('new-record');
    }
    elPlayAgain.textContent = 'Speel opnieuw';
  }
  showScreen('result-screen');
}

$('play-again-btn').onclick = () => {
  if (!lastResult) return;
  const r = lastResult;
  lastResult = null;
  if (r.mode === 'challenge') startMode('challenge', { difficulty: r.difficulty, difficultyKey: r.difficultyKey });
  else startMode(r.mode);
};
$('back-to-menu-btn').onclick = () => backToMenu(true);

// =================================================================
// EVENT HANDLERS
// =================================================================
$('game-back-btn').onclick = () => backToMenu(false);

document.querySelectorAll('#menu-screen [data-mode]').forEach(btn => {
  btn.onclick = () => startMode(btn.dataset.mode);
});
document.querySelectorAll('#challenge-buttons button').forEach(btn => {
  btn.onclick = () => startMode('challenge', {
    difficulty: parseFloat(btn.dataset.diff),
    difficultyKey: btn.dataset.diff,
  });
});

document.addEventListener('keydown', (e) => {
  if ($('result-screen').classList.contains('active')) {
    if (e.key === 'Enter') { e.preventDefault(); $('play-again-btn').click(); }
    if (e.key === 'Escape') { e.preventDefault(); $('back-to-menu-btn').click(); }
    return;
  }
  if (!$('game-screen').classList.contains('active')) return;
  if (e.key === 'Escape') { e.preventDefault(); backToMenu(false); return; }
  if (!currentRound) return;
  if (currentRound.answered) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); elNext.click(); }
    return;
  }
  const idx = parseInt(e.key, 10);
  if (idx >= 1 && idx <= 4) {
    const btn = elOptions.children[idx-1];
    if (btn) btn.click();
  }
});

$('reset-btn').onclick = () => {
  if (!confirm('Weet je zeker dat je ALLES wilt resetten? ELO, highscores, challenge-records, foto-cache en blacklist worden gewist.')) return;
  state = Object.assign({}, DEFAULT_STATE);
  failedBirds.clear();
  for (const k in imageCache) delete imageCache[k];
  saveState(); saveFailed(); saveCache();
  renderMenu();
};

// =================================================================
// START
// =================================================================
renderMenu();
showScreen('menu-screen');
</script>
</body>
</html>
